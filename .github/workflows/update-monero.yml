name: Update Monero Version

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

jobs:
  check-and-update:
    name: Check and Update Monero
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Get latest Monero release
      id: latest
      run: |
        LATEST=$(curl -s https://api.github.com/repos/monero-project/monero/releases/latest | jq -r '.tag_name')
        echo "version=$LATEST" >> $GITHUB_OUTPUT

    - name: Get current version from Dockerfile
      id: current
      run: |
        CURRENT=$(grep '^ARG MONERO_BRANCH=' src/Dockerfile | cut -d= -f2)
        echo "version=$CURRENT" >> $GITHUB_OUTPUT

    - name: Update Dockerfile and push
      if: steps.latest.outputs.version != steps.current.outputs.version
      run: |
        sed -i "s/^ARG MONERO_BRANCH=.*/ARG MONERO_BRANCH=${{ steps.latest.outputs.version }}/" src/Dockerfile
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/Dockerfile
        git commit -m "update monero to ${{ steps.latest.outputs.version }}"
        git push

  keepalive-job:
    name: Keepalive Workflow
    if: ${{ always() }}
    needs: check-and-update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v6
    - name: Keep workflow alive
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        LAST=$(git log -1 --format="%ct")
        NOW=$(date +%s)
        DAYS=$(( (NOW - LAST) / 86400 ))
        if [ "$DAYS" -ge 45 ]; then
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
        else
          echo "Last commit was $DAYS days ago, no keepalive needed."
        fi
