name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      meta_tags: ${{ steps.tags.outputs.meta_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Extract Monero version from Dockerfile
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^ARG MONERO_BRANCH=' src/Dockerfile | cut -d= -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set Docker tags
        id: tags
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          {
            echo "meta_tags<<EOF"
            echo "type=raw,value=${VERSION}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "type=raw,value=latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: Enucatl/docker-compose-security-baseline/.github/workflows/docker-ci.yml@main
    with:
      image_name: ghcr.io/enucatl/monerod
      version: ${{ needs.prepare.outputs.version }}
      meta_tags: ${{ needs.prepare.outputs.meta_tags }}
      context: .
      dockerfile: src/Dockerfile
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
